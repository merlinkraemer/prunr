name: Prunr
options:
  bundleIdPrefix: com.prunr
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

packages:
  GRDB:
    path: LocalPackages/GRDB.swift
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.7.1"

targets:
  Prunr:
    type: application
    platform: macOS
    sources:
      - path: Prunr
        excludes:
          - LegacyViews/**
          - Info.plist
    info:
      path: Prunr/Info.plist
      properties:
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSApplicationCategoryType: public.app-category.utilities
        LSMinimumSystemVersion: "14.0"
        NSHumanReadableCopyright: "Copyright © 2026"
        SUFeedURL: https://merlinkraemer.github.io/prunr/appcast.xml
        SUEnableInstallerLauncherService: true
        SUPublicEDKey: wLRwLHzdujt8cigHTP7q5gSXSkfZGbhQI8HO1F4FLXo=
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.prunr.app
        PRODUCT_NAME: Prunr
        MARKETING_VERSION: "0.1.5-alpha.1"
        CURRENT_PROJECT_VERSION: "2"
        SWIFT_VERSION: "5.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: PM5QWB5426
        ENABLE_HARDENED_RUNTIME: YES
        ENABLE_PREVIEWS: YES
    dependencies:
      - package: GRDB
      - package: Sparkle
        product: Sparkle
    entitlements:
      path: Prunr/Prunr.entitlements
      properties:
        com.apple.security.app-sandbox: false

  PrunrTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: PrunrTests
    dependencies:
      - target: Prunr
      - package: GRDB
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.prunr.app.tests
        PRODUCT_NAME: PrunrTests
        SWIFT_VERSION: "5.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: PM5QWB5426
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Prunr:
    build:
      targets:
        Prunr: all
    test:
      targets:
        - PrunrTests
