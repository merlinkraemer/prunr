name: Prunr
options:
  bundleIdPrefix: com.prunr
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

packages:
  GRDB:
    path: LocalPackages/GRDB.swift
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.7.1"

targets:
  Prunr:
    type: application
    platform: macOS
    sources:
      - path: Prunr
        excludes:
          - LegacyViews/**
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.prunr.app
        PRODUCT_NAME: Prunr
        MARKETING_VERSION: "0.1.3"
        CURRENT_PROJECT_VERSION: "3"
        SWIFT_VERSION: "5.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: PM5QWB5426
        ENABLE_HARDENED_RUNTIME: YES
        ENABLE_PREVIEWS: YES
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.utilities
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026"
        INFOPLIST_KEY_LSMinimumSystemVersion: "14.0"
        INFOPLIST_KEY_SUEnableInstallerLauncherService: YES
        INFOPLIST_KEY_SUFeedURL: "https://merlinkraemer.github.io/prunr/appcast.xml"
        INFOPLIST_KEY_SUPublicEDKey: ""
    dependencies:
      - package: GRDB
      - package: Sparkle
        product: Sparkle
    entitlements:
      path: Prunr/Prunr.entitlements
      properties:
        com.apple.security.app-sandbox: false

  PrunrTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: PrunrTests
    dependencies:
      - target: Prunr
      - package: GRDB
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.prunr.app.tests
        PRODUCT_NAME: PrunrTests
        SWIFT_VERSION: "5.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: PM5QWB5426
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Prunr:
    build:
      targets:
        Prunr: all
    test:
      targets:
        - PrunrTests
