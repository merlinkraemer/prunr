name: Prunr
options:
  bundleIdPrefix: com.prunr
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: 7.0.0

targets:
  Prunr:
    type: application
    platform: macOS
    sources:
      - path: Prunr
        excludes:
          - LegacyViews/**
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.prunr.app
        PRODUCT_NAME: Prunr
        MARKETING_VERSION: "0.1.2"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: $(DEVELOPMENT_TEAM)
        ENABLE_PREVIEWS: YES
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.utilities
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026"
        INFOPLIST_KEY_LSMinimumSystemVersion: "14.0"
    dependencies:
      - package: GRDB
    entitlements:
      path: Prunr/Prunr.entitlements
      properties:
        com.apple.security.app-sandbox: false
